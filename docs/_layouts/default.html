<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title | default: "Calgary LEGO Train Club" }}</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32.png' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}?v=20260614-7">
    <script src="{{ '/assets/gallery.js' | relative_url }}?v=20260614-3" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="Calgary LEGO Train Club home">
          <img class="brand__logo" src="{{ '/assets/ctlc_logo_wht.png' | relative_url }}" alt="">
          <span class="brand__text">Calgary LEGO Train Club</span>
        </a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="#about--mission">About</a>
          <a href="#how-to-join">Join</a>
          <a href="#events">Photos</a>
          <a href="https://cltc.ca/m/" target="_blank" rel="noopener noreferrer">Members</a>
          <a href="#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main class="page-shell">
      {{ content }}
    </main>

    <div class="lightbox" data-lightbox hidden role="dialog" aria-modal="true" aria-label="Photo viewer">
      <button class="lightbox__close" type="button" data-lightbox-close aria-label="Close photo viewer">Close</button>
      <figure class="lightbox__frame">
        <img class="lightbox__image" data-lightbox-image src="" alt="">
        <figcaption class="lightbox__caption" data-lightbox-caption></figcaption>
      </figure>
    </div>

    <footer class="site-footer">
      <p>Calgary LEGO Train Club</p>
      <nav class="footer-links" aria-label="Social links">
        <a href="https://www.facebook.com/CalgaryLegoTrainClub" target="_blank" rel="noopener noreferrer">Facebook</a>
        <a href="https://www.instagram.com/calgarylegotrainclub?utm_source=ig_web_button_share_sheet&amp;igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener noreferrer">Instagram</a>
      </nav>
    </footer>
  </body>
</html>
