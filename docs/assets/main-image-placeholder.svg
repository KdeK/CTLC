<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-labelledby="title desc">
  <title id="title">Main image placeholder</title>
  <desc id="desc">A placeholder panel for a future Calgary LEGO Train Club hero image.</desc>
  <defs>
    <pattern id="studs" width="96" height="96" patternUnits="userSpaceOnUse">
      <rect width="96" height="96" fill="#f3f4f6"/>
      <circle cx="48" cy="48" r="19" fill="#d9dde3"/>
      <circle cx="42" cy="42" r="8" fill="#eef0f3"/>
    </pattern>
    <linearGradient id="fade" x1="0" x2="1">
      <stop offset="0" stop-color="#111827" stop-opacity=".84"/>
      <stop offset=".62" stop-color="#1f2937" stop-opacity=".54"/>
      <stop offset="1" stop-color="#374151" stop-opacity=".3"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="700" fill="url(#studs)"/>
  <rect width="1600" height="700" fill="url(#fade)"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M230 485h820" stroke="#ffd500" stroke-width="32"/>
    <path d="M270 525h760" stroke="#111827" stroke-width="18"/>
    <path d="M340 470h120m150 0h120m150 0h120" stroke="#111827" stroke-width="16"/>
    <rect x="370" y="270" width="250" height="150" rx="18" fill="#d01012" stroke="#111827" stroke-width="18"/>
    <rect x="640" y="240" width="330" height="180" rx="18" fill="#006db7" stroke="#111827" stroke-width="18"/>
    <rect x="992" y="305" width="160" height="115" rx="18" fill="#00a651" stroke="#111827" stroke-width="18"/>
    <circle cx="440" cy="435" r="45" fill="#111827"/>
    <circle cx="555" cy="435" r="45" fill="#111827"/>
    <circle cx="730" cy="435" r="45" fill="#111827"/>
    <circle cx="880" cy="435" r="45" fill="#111827"/>
    <circle cx="1068" cy="435" r="45" fill="#111827"/>
    <circle cx="440" cy="435" r="18" fill="#f3f4f6"/>
    <circle cx="555" cy="435" r="18" fill="#f3f4f6"/>
    <circle cx="730" cy="435" r="18" fill="#f3f4f6"/>
    <circle cx="880" cy="435" r="18" fill="#f3f4f6"/>
